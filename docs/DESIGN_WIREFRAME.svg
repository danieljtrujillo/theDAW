<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" font-family="ui-sans-serif, system-ui, Segoe UI, sans-serif">
  <defs>
    <!-- SLIDE conic-arc knob -->
    <g id="knob">
      <circle r="14" fill="#1a1426" stroke="#3a3050" stroke-width="1.5"/>
      <path d="M -9.9 9.9 A 14 14 0 1 1 12.1 7" fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="-11" stroke="#e9d5ff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- SLIDE glass-capsule fader (top at y=0) -->
    <g id="fader">
      <rect x="-6" y="0" width="12" height="54" rx="6" fill="#120e1c" stroke="#3a3050" stroke-width="1.2"/>
      <rect x="-4" y="28" width="8" height="24" rx="4" fill="#a855f7"/>
      <circle cx="0" cy="28" r="6" fill="#f0e6ff" stroke="#a855f7" stroke-width="1.2"/>
    </g>
    <!-- round LED toggle -->
    <g id="rtoggle">
      <circle r="11" fill="#2a1840" stroke="#a855f7" stroke-width="2"/>
      <circle r="3.2" fill="#f0e6ff"/>
    </g>
    <!-- small corner icon button -->
    <g id="iconbtn">
      <rect x="-8" y="-8" width="16" height="16" rx="4" fill="#0e0a16" stroke="#3a3050" stroke-width="1"/>
    </g>
    <!-- waveform squiggle (unit width 0..100, amp -1..1) -->
    <polyline id="wave" vector-effect="non-scaling-stroke" fill="none" stroke="#a855f7" stroke-width="1.4"
      points="0,0 3,-0.6 6,0.4 9,-0.9 12,0.7 15,-0.3 18,0.85 21,-0.5 24,0.2 27,-0.78 30,0.6 33,-0.95 36,0.45 39,-0.2 42,0.82 45,-0.65 48,0.3 51,-0.85 54,0.55 57,-0.4 60,0.92 63,-0.55 66,0.25 69,-0.72 72,0.66 75,-0.3 78,0.82 81,-0.6 84,0.35 87,-0.92 90,0.5 93,-0.25 96,0.7 100,0"/>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6d28d9"/>
    </marker>
  </defs>

  <style>
    .h{fill:#e8e2f4;font-weight:700}
    .sub{fill:#8a7fa6}
    .lbl{fill:#9b90b5;font-weight:600}
    .acc{fill:#c084fc;font-weight:700}
    .dim{fill:#6f6685}
    .card{fill:#15111d;stroke:#2e2640;stroke-width:1.2}
    .slot{fill:#100c1a;stroke:#2a2438;stroke-width:1}
    .btn{fill:#1c1430;stroke:#5b3a9e;stroke-width:1.2}
  </style>

  <rect x="0" y="0" width="1320" height="980" fill="#0b0810"/>

  <!-- title -->
  <text x="40" y="34" class="h" font-size="22">theDAW — Unified Tab Layout (wireframe)</text>
  <text x="40" y="56" class="sub" font-size="13">waveforms up top · left → right flow · symmetric rails · shared column/row layout · SLIDE knobs · faders · toggles</text>

  <!-- tab strip (same shell, every tab) — centered, DJ on the symmetry axis -->
  <g font-size="11" text-anchor="middle" font-weight="700">
    <rect x="327" y="70" width="74" height="22" rx="5" class="btn"/><text x="364" y="85" class="acc">MAKE</text>
    <rect x="409" y="70" width="74" height="22" rx="5" fill="#141019" stroke="#2a2438"/><text x="446" y="85" class="dim">EDIT</text>
    <rect x="491" y="70" width="74" height="22" rx="5" fill="#141019" stroke="#2a2438"/><text x="528" y="85" class="dim">MIX</text>
    <rect x="573" y="70" width="74" height="22" rx="5" fill="#141019" stroke="#2a2438"/><text x="610" y="85" class="dim">DJ</text>
    <rect x="655" y="70" width="74" height="22" rx="5" fill="#141019" stroke="#2a2438"/><text x="692" y="85" class="dim">VJ</text>
    <rect x="737" y="70" width="74" height="22" rx="5" fill="#141019" stroke="#2a2438"/><text x="774" y="85" class="dim">TRAIN</text>
    <rect x="819" y="70" width="74" height="22" rx="5" fill="#141019" stroke="#2a2438"/><text x="856" y="85" class="dim">LEARN</text>
  </g>

  <!-- panel -->
  <rect x="40" y="104" width="1140" height="708" rx="10" fill="#0f0b17" stroke="#2a2436" stroke-width="1.5"/>

  <!-- left -> right flow -->
  <line x1="70" y1="118" x2="1145" y2="118" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="2 5" marker-end="url(#arrow)" opacity="0.8"/>
  <text x="70" y="114" class="dim" font-size="10">left → right flow</text>

  <!-- symmetry axis -->
  <line x1="610" y1="126" x2="610" y2="806" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4 5" opacity="0.45"/>
  <text x="616" y="800" class="dim" font-size="10" opacity="0.8">symmetry axis</text>

  <!-- ============ TOP BAND: waveforms / inputs ============ -->
  <rect x="52"  y="126" width="552" height="118" rx="8" class="card"/>
  <rect x="616" y="126" width="552" height="118" rx="8" class="card"/>
  <text x="64" y="144" class="lbl" font-size="11">INIT — input waveform</text>
  <text x="628" y="144" class="lbl" font-size="11">INPAINT — input waveform (+ mask region)</text>
  <use href="#wave" transform="translate(70 195) scale(5.3 26)"/>
  <use href="#wave" transform="translate(634 195) scale(5.3 26)"/>

  <!-- ============ UPPER BAND: rails + hero ============ -->
  <!-- left rail: stacked hardware-cards -->
  <rect x="52" y="258" width="172" height="26" rx="6" class="btn"/>
  <text x="138" y="275" class="acc" font-size="11" text-anchor="middle">PRESETS  ▾</text>

  <rect x="52" y="292" width="172" height="150" rx="8" class="card"/>
  <text x="64" y="309" class="acc" font-size="10" letter-spacing="1.5">CONTROLS</text>
  <g>
    <!-- mini SLIDE rows: label · capsule · value -->
    <g transform="translate(0 324)"><text x="62" y="4" class="dim" font-size="9">Len</text><rect x="92" y="-3" width="96" height="7" rx="3.5" class="slot"/><rect x="92" y="-3" width="40" height="7" rx="3.5" fill="#a855f7"/><circle cx="132" cy="0.5" r="5" fill="#f0e6ff"/><rect x="194" y="-5" width="22" height="12" rx="2" class="slot"/></g>
    <g transform="translate(0 346)"><text x="62" y="4" class="dim" font-size="9">Steps</text><rect x="92" y="-3" width="96" height="7" rx="3.5" class="slot"/><rect x="92" y="-3" width="18" height="7" rx="3.5" fill="#7c3aed"/><circle cx="110" cy="0.5" r="5" fill="#f0e6ff"/><rect x="194" y="-5" width="22" height="12" rx="2" class="slot"/></g>
    <g transform="translate(0 368)"><text x="62" y="4" class="dim" font-size="9">CFG</text><rect x="92" y="-3" width="96" height="7" rx="3.5" class="slot"/><rect x="92" y="-3" width="10" height="7" rx="3.5" fill="#6d28d9"/><circle cx="102" cy="0.5" r="5" fill="#f0e6ff"/><rect x="194" y="-5" width="22" height="12" rx="2" class="slot"/></g>
    <g transform="translate(0 390)"><text x="62" y="4" class="dim" font-size="9">Seed</text><rect x="92" y="-3" width="96" height="7" rx="3.5" class="slot"/><rect x="92" y="-3" width="6" height="7" rx="3.5" fill="#6d28d9"/><circle cx="98" cy="0.5" r="5" fill="#f0e6ff"/><rect x="194" y="-5" width="22" height="12" rx="2" class="slot"/></g>
    <g transform="translate(0 412)"><text x="62" y="4" class="dim" font-size="9">Batch</text><rect x="194" y="-5" width="22" height="12" rx="2" class="slot"/></g>
  </g>

  <rect x="52" y="450" width="172" height="146" rx="8" class="card"/>
  <text x="64" y="467" class="acc" font-size="10" letter-spacing="1.5">TEMPLATES</text>
  <rect x="62" y="474" width="152" height="14" rx="3" class="slot"/>
  <rect x="62" y="494" width="152" height="12" rx="2" class="slot"/>
  <rect x="62" y="510" width="152" height="12" rx="2" class="slot"/>
  <rect x="62" y="526" width="152" height="12" rx="2" class="slot"/>

  <!-- center: tabs + strip + (SAMPLER·TEMP | HERO | SCHEDULE·FX) -->
  <rect x="540" y="258" width="64" height="22" rx="5" class="btn"/><text x="572" y="273" class="acc" font-size="10" text-anchor="middle">Chimera</text>
  <rect x="616" y="258" width="64" height="22" rx="5" fill="#141019" stroke="#2a2438"/><text x="648" y="273" class="dim" font-size="10" text-anchor="middle">Compare</text>

  <rect x="244" y="288" width="732" height="26" rx="6" fill="#1a1030" stroke="#3a2a5a" stroke-width="1"/>
  <text x="610" y="305" class="dim" font-size="10" text-anchor="middle" letter-spacing="2">renderweave · latent strip</text>

  <!-- SAMPLER / TEMP column -->
  <rect x="244" y="322" width="172" height="258" rx="8" class="card"/>
  <text x="256" y="339" class="acc" font-size="10" letter-spacing="1">SAMPLER · TEMP</text>
  <use href="#knob" transform="translate(286 366)"/><use href="#knob" transform="translate(330 366)"/><use href="#knob" transform="translate(374 366)"/>
  <line x1="252" y1="388" x2="408" y2="388" stroke="#2a2438"/>
  <rect x="256" y="394" width="152" height="16" rx="4" class="slot"/>
  <use href="#fader" transform="translate(282 462)"/><use href="#fader" transform="translate(326 462)"/><use href="#fader" transform="translate(370 462)"/><use href="#fader" transform="translate(404 462)"/>

  <!-- HERO: chimera stack -->
  <rect x="442" y="322" width="336" height="258" rx="8" fill="#120c1f" stroke="#3a2a5a" stroke-width="1.4"/>
  <text x="610" y="340" class="lbl" font-size="11" text-anchor="middle">HERO — chimera stack (the focus)</text>
  <rect x="456" y="352" width="308" height="34" rx="5" class="slot"/>
  <rect x="456" y="392" width="308" height="34" rx="5" class="slot"/>
  <rect x="456" y="432" width="308" height="34" rx="5" class="slot"/>
  <rect x="456" y="472" width="308" height="34" rx="5" class="slot"/>
  <rect x="456" y="512" width="308" height="34" rx="5" class="slot"/>

  <!-- SCHEDULE / FX column -->
  <rect x="790" y="322" width="172" height="258" rx="8" class="card"/>
  <text x="802" y="339" class="acc" font-size="10" letter-spacing="1">SCHEDULE · FX</text>
  <use href="#knob" transform="translate(818 366)"/>
  <use href="#rtoggle" transform="translate(866 366)"/><use href="#rtoggle" transform="translate(902 366)"/><use href="#rtoggle" transform="translate(938 366)"/>
  <line x1="798" y1="388" x2="954" y2="388" stroke="#2a2438"/>
  <rect x="800" y="394" width="36" height="14" rx="3" class="slot"/><rect x="840" y="394" width="36" height="14" rx="3" class="slot"/><rect x="880" y="394" width="36" height="14" rx="3" class="slot"/><rect x="920" y="394" width="34" height="14" rx="3" class="slot"/>
  <use href="#fader" transform="translate(822 462)"/><use href="#fader" transform="translate(866 462)"/><use href="#fader" transform="translate(910 462)"/><use href="#fader" transform="translate(948 462)"/>

  <!-- right rail: stacked hardware-cards (mirror of left) -->
  <rect x="988" y="258" width="180" height="26" rx="6" class="btn"/>
  <text x="1078" y="275" class="acc" font-size="11" text-anchor="middle">LoRA (2)  ▾</text>

  <rect x="988" y="292" width="180" height="42" rx="8" class="card"/>
  <text x="1000" y="309" class="acc" font-size="10" letter-spacing="1.5">NAME</text>
  <rect x="1000" y="314" width="156" height="14" rx="3" class="slot"/>

  <rect x="988" y="342" width="180" height="86" rx="8" class="card"/>
  <text x="1000" y="359" class="acc" font-size="10" letter-spacing="1.5">OUTPUT</text>
  <text x="1000" y="376" class="dim" font-size="9">Format</text><rect x="1000" y="380" width="74" height="16" rx="3" class="slot"/>
  <text x="1086" y="376" class="dim" font-size="9">Naming</text><rect x="1082" y="380" width="74" height="16" rx="3" class="slot"/>

  <rect x="988" y="436" width="180" height="144" rx="8" class="card"/>
  <text x="1000" y="453" class="acc" font-size="10" letter-spacing="1.5">QUICK ACTIONS</text>
  <rect x="1000" y="460" width="74" height="44" rx="5" class="slot"/><rect x="1082" y="460" width="74" height="44" rx="5" class="slot"/>
  <rect x="1000" y="510" width="74" height="44" rx="5" class="slot"/><rect x="1082" y="510" width="74" height="44" rx="5" class="slot"/>

  <!-- ============ BOTTOM BAND: visualizer | prompt | visualizer (mirrored) ============ -->
  <rect x="52"  y="592" width="352" height="208" rx="8" fill="#0a0712" stroke="#3a2a5a" stroke-width="1.2"/>
  <rect x="816" y="592" width="352" height="208" rx="8" fill="#0a0712" stroke="#3a2a5a" stroke-width="1.2"/>
  <!-- orbs -->
  <circle cx="210" cy="700" r="52" fill="none" stroke="#a855f7" stroke-width="1.4"/>
  <g stroke="#7c3aed" stroke-width="1">
    <line x1="210" y1="648" x2="210" y2="636"/><line x1="262" y1="700" x2="274" y2="700"/><line x1="210" y1="752" x2="210" y2="764"/><line x1="158" y1="700" x2="146" y2="700"/>
    <line x1="247" y1="663" x2="256" y2="654"/><line x1="247" y1="737" x2="256" y2="746"/><line x1="173" y1="663" x2="164" y2="654"/><line x1="173" y1="737" x2="164" y2="746"/>
  </g>
  <circle cx="1010" cy="700" r="52" fill="none" stroke="#a855f7" stroke-width="1.4"/>
  <g stroke="#7c3aed" stroke-width="1">
    <line x1="1010" y1="648" x2="1010" y2="636"/><line x1="1062" y1="700" x2="1074" y2="700"/><line x1="1010" y1="752" x2="1010" y2="764"/><line x1="958" y1="700" x2="946" y2="700"/>
  </g>
  <!-- mode/fullscreen icon stacks, mirrored toward center -->
  <g><use href="#iconbtn" transform="translate(388 612)"/><use href="#iconbtn" transform="translate(388 634)"/><use href="#iconbtn" transform="translate(388 656)"/><use href="#iconbtn" transform="translate(388 678)"/><use href="#iconbtn" transform="translate(388 700)"/></g>
  <g><use href="#iconbtn" transform="translate(832 612)"/><use href="#iconbtn" transform="translate(832 634)"/><use href="#iconbtn" transform="translate(832 656)"/><use href="#iconbtn" transform="translate(832 678)"/><use href="#iconbtn" transform="translate(832 700)"/></g>
  <text x="210" y="788" class="dim" font-size="9" text-anchor="middle">visualizer (container-sized · icons inward)</text>
  <text x="1010" y="788" class="dim" font-size="9" text-anchor="middle">visualizer (mirrored)</text>

  <!-- prompt (centered) -->
  <rect x="416" y="592" width="388" height="208" rx="8" class="card"/>
  <text x="428" y="611" class="acc" font-size="10" letter-spacing="1.5">PROMPT</text>
  <rect x="426" y="618" width="368" height="138" rx="5" class="slot"/>
  <rect x="426" y="762" width="368" height="30" rx="5" class="slot"/>
  <text x="610" y="690" class="dim" font-size="10" text-anchor="middle">prompt (+ small negative)</text>

  <!-- footer = master transport -->
  <rect x="40" y="824" width="1140" height="30" rx="7" fill="#15111d" stroke="#2e2640" stroke-width="1.2"/>
  <text x="56" y="843" class="lbl" font-size="11">FOOTER — master transport:  ▶  ■  ⟲ seek  ·  CREATE  (every tab's primary action runs here, never a local button)</text>

  <!-- ====== right gutter band braces ====== -->
  <g stroke="#6d28d9" stroke-width="1.2" fill="none" opacity="0.8">
    <path d="M1192 126 h8 v118 h-8"/>
    <path d="M1192 258 h8 v322 h-8"/>
    <path d="M1192 592 h8 v208 h-8"/>
  </g>
  <g font-size="10.5">
    <text x="1206" y="178" class="lbl">WAVEFORMS /</text><text x="1206" y="192" class="lbl">INPUTS —</text><text x="1206" y="206" class="dim">always up top,</text><text x="1206" y="220" class="dim">fixed height</text>
    <text x="1206" y="404" class="lbl">WORKING AREA</text><text x="1206" y="418" class="dim">flex-1, absorbs</text><text x="1206" y="432" class="dim">slack · rails</text><text x="1206" y="446" class="dim">flank the hero</text>
    <text x="1206" y="686" class="lbl">VISUAL ⟷</text><text x="1206" y="700" class="lbl">PROMPT —</text><text x="1206" y="714" class="dim">fixed, mirrored</text>
  </g>

  <!-- ====== legend: SLIDE controls ====== -->
  <text x="40" y="888" class="h" font-size="13">SLIDE control surface — reuse everywhere</text>
  <use href="#knob" transform="translate(70 928)"/>
  <text x="94" y="924" class="lbl" font-size="11">Knob</text><text x="94" y="938" class="dim" font-size="10">conic arc, lag-free, value-colored</text>
  <use href="#fader" transform="translate(330 908)"/>
  <text x="350" y="924" class="lbl" font-size="11">Fader</text><text x="350" y="938" class="dim" font-size="10">glass capsule, magnifying ruler</text>
  <use href="#rtoggle" transform="translate(600 928)"/>
  <text x="622" y="924" class="lbl" font-size="11">Toggle</text><text x="622" y="938" class="dim" font-size="10">round LED, matches the knobs</text>
  <rect x="840" y="918" width="26" height="14" rx="2" class="slot"/>
  <text x="876" y="924" class="lbl" font-size="11">Value</text><text x="876" y="938" class="dim" font-size="10">narrow, flush right, tinted by level</text>
  <rect x="1120" y="916" width="60" height="18" rx="5" class="btn"/><text x="1150" y="929" class="acc" font-size="10" text-anchor="middle">Dropdown</text>
  <text x="1120" y="950" class="dim" font-size="10">PRESETS pattern (reused for LoRA)</text>
</svg>
