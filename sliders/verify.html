<head>

  <style>
    #app { gap: 56px; padding: 30px; align-items: flex-start; flex-wrap: wrap; }

  </style>
</head>

<body>

    <!-- data-name = the track / video / song / image name (white label). -->

    <div class="ts" data-slider data-value="30" data-name="KICK"></div>
    <div class="ts" data-slider data-value="50" data-name="BASS"></div>
    <div class="ts" data-slider data-value="70" data-name="BLOOM"></div>
    <div class="ts" data-slider data-value="88" data-name="GLITCH"></div>
    <div class="ts" data-slider data-value="100" data-name="STROBE"></div>
  </main>
  <script src="./script.js"></script>
</body>

</html>
