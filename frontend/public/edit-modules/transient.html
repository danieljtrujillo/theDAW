<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transient</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#07080c;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans',sans-serif;color:#e2e4ea;overflow:hidden}

/* ── MODULE FRAME 780x504 ── */
.module-frame{width:780px;max-width:780px;height:504px;max-height:504px;background:#0e1018;border:1px solid #1e2230;border-radius:6px;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER 28px ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:#0a0b10;border-bottom:1px solid #1a1d28;flex-shrink:0;height:28px}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-icon{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#34d399,#059669);box-shadow:0 0 6px rgba(52,211,153,.3)}
.mod-title{font-weight:700;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#c8cad0;font-family:'IBM Plex Mono',monospace}
.preset-nav{display:flex;align-items:center;gap:2px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:#5a5e6a}
.preset-nav button{background:none;border:none;color:#5a5e6a;font-size:9px;cursor:pointer;padding:0 2px}
.preset-nav button:hover{color:#a0a4b0}
.preset-name{color:#6b7080;min-width:80px;text-align:center;padding:1px 6px;border:1px solid #1e2230;border-radius:3px;background:#0a0c12}
.hdr-right{display:flex;align-items:center;gap:3px}
.pill{font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:600;letter-spacing:.4px;padding:2px 6px;border-radius:3px;border:1px solid #22262e;background:#0c0e14;color:#3e4250;cursor:pointer;transition:all 120ms;user-select:none}
.pill:hover{border-color:#3a3e4a}
.pill.active{background:#081a14;border-color:#34d399;color:#34d399}

/* ── BODY ── */
.body{flex:1;display:flex;flex-direction:column;min-height:0;padding:6px 8px 4px;gap:4px}

/* Waveform canvas — 50% height */
.wave-section{flex:0 0 45%;background:#060810;border:1px solid #14171e;border-radius:5px;position:relative;overflow:hidden;min-height:0}
.wave-section canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* Canvas overlay labels */
.wave-label{position:absolute;top:8px;left:10px;font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(52,211,153,.4);letter-spacing:.8px;text-transform:uppercase;pointer-events:none;z-index:1;font-weight:600}
.wave-label-atk{position:absolute;top:8px;left:10px;font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(52,211,153,.5);letter-spacing:1px;text-transform:uppercase;pointer-events:none;z-index:1;font-weight:700}
.wave-label-sus{position:absolute;top:8px;left:90px;font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(52,211,153,.3);letter-spacing:1px;text-transform:uppercase;pointer-events:none;z-index:1;font-weight:600}
.wave-scope{position:absolute;top:6px;right:10px;font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(255,255,255,.25);pointer-events:none;z-index:1;font-weight:600;display:flex;align-items:center;gap:4px}
.scope-label{font-size:6px;color:#3e4250;letter-spacing:.4px;text-transform:uppercase}
.scope-val{color:#8890a0;font-weight:700}

/* Scale markers along bottom of waveform */
.wave-scale{position:absolute;bottom:4px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none;z-index:1}
.ws-tick{font-family:'IBM Plex Mono',monospace;font-size:5px;color:rgba(255,255,255,.08);font-weight:500}

/* dB scale along left */
.wave-db{position:absolute;top:20px;left:4px;bottom:20px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none;z-index:1}
.wd-tick{font-family:'IBM Plex Mono',monospace;font-size:5px;color:rgba(255,255,255,.08);font-weight:500}

/* Output meter (right side inside canvas) */
.wave-meter{position:absolute;top:24px;right:8px;bottom:20px;width:6px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:3px;overflow:hidden;z-index:1}
.wm-fill{position:absolute;bottom:0;left:0;right:0;height:0%;background:linear-gradient(to top,rgba(52,211,153,.3),rgba(52,211,153,.7));border-radius:0 0 2px 2px;transition:height .08s}

/* ── KNOBS ROW ── */
.knobs-row{display:flex;align-items:flex-start;justify-content:center;gap:14px;flex-shrink:0;padding:8px 10px 4px}
.knob-unit{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;user-select:none;width:90px}
.ku-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#3e4250;letter-spacing:.6px;text-transform:uppercase;font-weight:600;margin-bottom:2px;text-align:center}
.ku-svg{display:block}
.ku-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#a0a4b0;line-height:1;margin-top:2px;text-align:center}

/* Monitor mode selector (centered between knobs) */
.monitor-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;width:110px;padding-top:2px}
.monitor-label{font-family:'IBM Plex Mono',monospace;font-size:6px;color:#3e4250;letter-spacing:.6px;text-transform:uppercase;font-weight:600}
.monitor-icon{width:28px;height:28px;opacity:.5}
.monitor-tabs{display:flex;gap:1px;border-radius:3px;overflow:hidden;border:1px solid #1e2230}
.mon-tab{font-family:'IBM Plex Mono',monospace;font-size:6.5px;font-weight:600;padding:3px 8px;background:#0c0e14;color:#3e4250;cursor:pointer;transition:all 120ms;border:none;letter-spacing:.3px}
.mon-tab:hover{color:#8890a0}
.mon-tab.active{background:#081a14;color:#34d399}
.monitor-out{font-family:'IBM Plex Mono',monospace;font-size:6.5px;font-weight:600;padding:3px 10px;border-radius:3px;border:1px solid #1e2230;background:#0c0e14;color:#3e4250;cursor:pointer;transition:all 120ms;margin-top:1px}
.monitor-out:hover{color:#8890a0}
.monitor-out.active{background:#081a14;border-color:#34d399;color:#34d399}

/* ── FOOTER 28px ── */
.footer{display:flex;align-items:center;gap:6px;padding:0 8px;background:#08090e;border-top:1px solid #14171e;flex-shrink:0;height:28px}
.footer-btn{font-family:'IBM Plex Mono',monospace;font-size:7.5px;font-weight:600;padding:2px 8px;border-radius:3px;border:1px solid #22262e;background:#0c0e14;color:#6b7080;cursor:pointer;transition:background 120ms,color 120ms}
.footer-btn:hover{background:#14171e;color:#c8cad0}
.footer-btn.active{background:#081a14;border-color:#34d399;color:#34d399}
.footer-spacer{flex:1}
.footer-status{font-family:'IBM Plex Mono',monospace;font-size:7px;color:#444a58}
.mode-tabs{display:flex;gap:1px;border-radius:3px;overflow:hidden;border:1px solid #1e2230;margin-left:4px}
.mode-tab{font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:600;padding:2px 8px;background:#0c0e14;color:#3e4250;cursor:pointer;transition:all 120ms;border:none}
.mode-tab:hover{color:#8890a0}
.mode-tab.active{background:#081a14;color:#34d399}
audio{display:none}
input[type="file"]{display:none}
</style>
</head>
<body>
<div class="module-frame">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon"></div>
      <span class="mod-title">Transient</span>
      <div class="preset-nav">
        <button>&#9666;</button>
        <span class="preset-name">Punchy Drums</span>
        <button>&#9656;</button>
      </div>
    </div>
    <div class="hdr-right">
      <button class="pill" id="btnAB">A / B</button>
      <button class="pill" id="btnCopy">Copy</button>
      <button class="pill" id="btnDelta">Delta</button>
      <button class="pill" id="btnBypassH">&#9685;</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">
    <!-- Waveform canvas -->
    <div class="wave-section" id="waveWrap">
      <canvas id="waveCanvas"></canvas>
      <span class="wave-label-atk" id="atkOverlay">Attack</span>
      <span class="wave-label-sus" id="susOverlay">Sustain</span>
      <div class="wave-scope">
        <span class="scope-label">scope</span>
        <span class="scope-val" id="scopeVal">100%</span>
      </div>
      <!-- dB scale -->
      <div class="wave-db">
        <span class="wd-tick">0</span>
        <span class="wd-tick">-5</span>
        <span class="wd-tick">-10</span>
        <span class="wd-tick">-15</span>
        <span class="wd-tick">-20</span>
      </div>
      <!-- Time scale -->
      <div class="wave-scale">
        <span class="ws-tick">0ms</span>
        <span class="ws-tick">500ms</span>
        <span class="ws-tick">1000ms</span>
        <span class="ws-tick">2000ms</span>
        <span class="ws-tick">4000ms</span>
      </div>
      <!-- Output meter -->
      <div class="wave-meter">
        <div class="wm-fill" id="waveMeterFill"></div>
      </div>
    </div>

    <!-- Knobs Row -->
    <div class="knobs-row" id="knobsRow">
      <!-- Knobs injected by JS -->
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button class="footer-btn" id="btnBypass">Bypass</button>
    <button class="footer-btn active" id="btnTransient">Transient</button>
    <button class="footer-btn" id="btnModeLabel">Mode</button>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="modern">Modern</button>
      <button class="mode-tab" data-mode="classic">Classic</button>
      <button class="mode-tab" data-mode="smooth">Smooth</button>
    </div>
    <div class="footer-spacer"></div>
    <span class="footer-status" id="status">Ready</span>
    <button class="footer-btn" id="btnLoad">Load</button>
    <button class="footer-btn" id="btnTone">Tone</button>
    <button class="footer-btn" id="btnProcess">Process</button>
  </div>
</div>
<input type="file" id="fileInput" accept="audio/*">
<audio id="audioEl" crossorigin="anonymous"></audio>

<script>
(function(){
'use strict';

let inputFile = null;

/* ============================================================
   ACCENT & CONSTANTS
   ============================================================ */
const ACCENT = '#34d399';
const ACCENT_DIM = 'rgba(52,211,153,0.12)';
const KNOB_SIZE = 66;

/* ============================================================
   KNOB DEFINITIONS
   ============================================================ */
const knobDefs = [
  { id:'attack',      label:'Attack',      min:-100, max:100,  val:0,   step:1,   unit:'%', bipolar:true  },
  { id:'sustain',     label:'Sustain',     min:-100, max:100,  val:0,   step:1,   unit:'%', bipolar:true  },
  { id:'sensitivity', label:'Sensitivity', min:0,    max:100,  val:50,  step:1,   unit:'%', bipolar:false },
  { id:'_monitor',    label:'Monitor',     type:'monitor' },
  { id:'mix',         label:'Mix',         min:0,    max:100,  val:100, step:1,   unit:'%', bipolar:false },
  { id:'output',      label:'Output',      min:-12,  max:12,   val:0,   step:0.1, unit:'dB',bipolar:true  },
];

/* ============================================================
   SVG ROTARY KNOB RENDERER
   ============================================================ */
function polarXY(cx, cy, r, angle) {
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

function arcPath(cx, cy, r, a1, a2) {
  const s = polarXY(cx, cy, r, a1);
  const e = polarXY(cx, cy, r, a2);
  const large = Math.abs(a2 - a1) > Math.PI ? 1 : 0;
  return `M${s.x},${s.y} A${r},${r} 0 ${large} 1 ${e.x},${e.y}`;
}

function renderKnobSVG(svgEl, def) {
  const S = KNOB_SIZE;
  const cx = S / 2, cy = S / 2, r = S * 0.38;
  const startA = 0.75 * Math.PI;
  const endA = 2.25 * Math.PI;
  const range = endA - startA;
  const norm = (def.val - def.min) / (def.max - def.min);
  const valA = startA + norm * range;
  const centerA = startA + 0.5 * range;
  const ptr = polarXY(cx, cy, r - 4, valA);
  const ptrOuter = polarXY(cx, cy, r + 1, valA);

  let ticks = '';
  for (let t = 0; t <= 10; t++) {
    const a = startA + (t / 10) * range;
    const p1 = polarXY(cx, cy, r + 3, a);
    const p2 = polarXY(cx, cy, r + 5, a);
    ticks += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="rgba(255,255,255,.06)" stroke-width=".7"/>`;
  }

  /* Value arc */
  let valueArc = '';
  if (def.bipolar) {
    if (Math.abs(norm - 0.5) > 0.01) {
      const from = norm > 0.5 ? centerA : valA;
      const to = norm > 0.5 ? valA : centerA;
      valueArc = `<path d="${arcPath(cx, cy, r, from, to)}" fill="none" stroke="${ACCENT}" stroke-width="3.5" stroke-linecap="round"/>`;
      valueArc += `<path d="${arcPath(cx, cy, r, from, to)}" fill="none" stroke="${ACCENT}" stroke-width="10" stroke-linecap="round" opacity=".08"/>`;
    }
  } else {
    if (norm > 0.01) {
      valueArc = `<path d="${arcPath(cx, cy, r, startA, valA)}" fill="none" stroke="${ACCENT}" stroke-width="3.5" stroke-linecap="round"/>`;
      valueArc += `<path d="${arcPath(cx, cy, r, startA, valA)}" fill="none" stroke="${ACCENT}" stroke-width="10" stroke-linecap="round" opacity=".08"/>`;
    }
  }

  svgEl.innerHTML = `
    <defs>
      <radialGradient id="kbg_${def.id}" cx="40%" cy="35%" r="60%">
        <stop offset="0%" stop-color="#2a2d38"/>
        <stop offset="100%" stop-color="#0e1018"/>
      </radialGradient>
    </defs>
    ${ticks}
    <path d="${arcPath(cx, cy, r, startA, endA)}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="3.5" stroke-linecap="round"/>
    ${valueArc}
    <circle cx="${cx}" cy="${cy}" r="${r - 8}" fill="url(#kbg_${def.id})" stroke="rgba(255,255,255,.06)" stroke-width=".7"/>
    <line x1="${ptr.x}" y1="${ptr.y}" x2="${ptrOuter.x}" y2="${ptrOuter.y}" stroke="${ACCENT}" stroke-width="2" stroke-linecap="round"/>
  `;
}

/* ============================================================
   BUILD KNOBS ROW
   ============================================================ */
const knobsRow = document.getElementById('knobsRow');
const knobState = {};

knobDefs.forEach(def => {
  if (def.type === 'monitor') {
    /* Build monitor mode selector in center */
    const wrap = document.createElement('div');
    wrap.className = 'monitor-wrap';

    const label = document.createElement('div');
    label.className = 'monitor-label';
    label.textContent = 'Monitor';

    /* Waveform icon SVG */
    const iconSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    iconSvg.setAttribute('width', '28');
    iconSvg.setAttribute('height', '28');
    iconSvg.setAttribute('viewBox', '0 0 28 28');
    iconSvg.classList.add('monitor-icon');
    iconSvg.innerHTML = `<polyline points="2,14 5,8 8,18 11,6 14,20 17,10 20,16 23,12 26,14" fill="none" stroke="${ACCENT}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;

    const tabs = document.createElement('div');
    tabs.className = 'monitor-tabs';
    const tabAtk = document.createElement('button');
    tabAtk.className = 'mon-tab active';
    tabAtk.textContent = 'Attack / Sustain';
    tabAtk.dataset.mon = 'as';
    const tabOut = document.createElement('button');
    tabOut.className = 'mon-tab';
    tabOut.textContent = 'Output';
    tabOut.dataset.mon = 'out';
    tabs.appendChild(tabAtk);
    tabs.appendChild(tabOut);

    /* Tab switching */
    [tabAtk, tabOut].forEach(t => {
      t.addEventListener('click', () => {
        tabs.querySelectorAll('.mon-tab').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
      });
    });

    wrap.appendChild(label);
    wrap.appendChild(iconSvg);
    wrap.appendChild(tabs);
    knobsRow.appendChild(wrap);
    return;
  }

  knobState[def.id] = def.val;
  const unit = document.createElement('div');
  unit.className = 'knob-unit';
  unit.dataset.knobId = def.id;

  const labelEl = document.createElement('div');
  labelEl.className = 'ku-label';
  labelEl.textContent = def.label;

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', KNOB_SIZE);
  svg.setAttribute('height', KNOB_SIZE);
  svg.setAttribute('viewBox', `0 0 ${KNOB_SIZE} ${KNOB_SIZE}`);
  svg.classList.add('ku-svg');
  svg.id = 'knob_' + def.id;

  const valEl = document.createElement('div');
  valEl.className = 'ku-val';
  valEl.id = 'kval_' + def.id;

  unit.appendChild(labelEl);
  unit.appendChild(svg);
  unit.appendChild(valEl);
  knobsRow.appendChild(unit);

  renderKnobSVG(svg, def);
  updateKnobValue(def);
});

function updateKnobValue(def) {
  if (def.type === 'monitor') return;
  const el = document.getElementById('kval_' + def.id);
  if (def.unit === '%') {
    el.textContent = (def.bipolar && def.val > 0 ? '+' : '') + Math.round(def.val) + '%';
  } else if (def.unit === 'dB') {
    el.textContent = (def.val > 0 ? '+' : '') + def.val.toFixed(1) + ' dB';
  } else {
    el.textContent = def.val.toFixed(1);
  }
}

/* ============================================================
   KNOB DRAG INTERACTION
   ============================================================ */
let dragKnob = null;

knobsRow.addEventListener('pointerdown', e => {
  const unit = e.target.closest('.knob-unit');
  if (!unit) return;
  const id = unit.dataset.knobId;
  const def = knobDefs.find(d => d.id === id);
  if (!def || def.type === 'monitor') return;
  dragKnob = { def, startY: e.clientY, startVal: def.val };
  unit.setPointerCapture(e.pointerId);
});

knobsRow.addEventListener('pointermove', e => {
  if (!dragKnob) return;
  const def = dragKnob.def;
  const dy = dragKnob.startY - e.clientY;
  const range = def.max - def.min;
  const sensitivity = range / 150;
  let nv = dragKnob.startVal + dy * sensitivity;
  nv = Math.round(nv / def.step) * def.step;
  nv = Math.max(def.min, Math.min(def.max, nv));
  def.val = nv;
  knobState[def.id] = nv;
  renderKnobSVG(document.getElementById('knob_' + def.id), def);
  updateKnobValue(def);
  updateDSP();
});

knobsRow.addEventListener('pointerup', () => { dragKnob = null; });

/* Double-click to reset */
knobsRow.addEventListener('dblclick', e => {
  const unit = e.target.closest('.knob-unit');
  if (!unit) return;
  const id = unit.dataset.knobId;
  const def = knobDefs.find(d => d.id === id);
  if (!def || def.type === 'monitor') return;
  const defaults = { attack:0, sustain:0, sensitivity:50, mix:100, output:0 };
  def.val = defaults[id] !== undefined ? defaults[id] : 0;
  knobState[id] = def.val;
  renderKnobSVG(document.getElementById('knob_' + id), def);
  updateKnobValue(def);
  updateDSP();
});

/* ============================================================
   AUDIO ENGINE — DynamicsCompressorNode approximation
   ============================================================ */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
analyser.fftSize = 4096;
analyser.smoothingTimeConstant = 0.5;
const timeData = new Float32Array(analyser.fftSize);

const inputGain = audioCtx.createGain();
inputGain.gain.value = 1.0;

const compressor = audioCtx.createDynamicsCompressor();
compressor.threshold.value = -24;
compressor.knee.value = 6;
compressor.ratio.value = 4;
compressor.attack.value = 0.02;
compressor.release.value = 0.15;

const outputGain = audioCtx.createGain();
outputGain.gain.value = 1.0;

inputGain.connect(compressor);
compressor.connect(outputGain);
outputGain.connect(analyser);
analyser.connect(audioCtx.destination);

const audioEl = document.getElementById('audioEl');
let sourceNode = null;

function connectSource(el) {
  if (sourceNode) { try { sourceNode.disconnect(); } catch(e){} }
  sourceNode = audioCtx.createMediaElementSource(el);
  sourceNode.connect(inputGain);
}

function updateDSP() {
  if (!compressor) return;
  const atk = knobState.attack || 0;
  const sus = knobState.sustain || 0;
  const sens = knobState.sensitivity || 50;
  const out = knobState.output || 0;

  /* Map attack/sustain to compressor params */
  const atkNorm = (100 - atk) / 200;
  compressor.attack.setTargetAtTime(0.001 + atkNorm * 0.1, audioCtx.currentTime, 0.01);
  const susNorm = (sus + 100) / 200;
  compressor.release.setTargetAtTime(0.01 + susNorm * 0.79, audioCtx.currentTime, 0.01);
  const intensity = (Math.abs(atk) + Math.abs(sus)) / 200;
  compressor.threshold.setTargetAtTime(-6 - intensity * 30 - (sens / 100) * 10, audioCtx.currentTime, 0.01);
  outputGain.gain.setTargetAtTime(Math.pow(10, out / 20), audioCtx.currentTime, 0.02);
}
updateDSP();

/* ============================================================
   ENVELOPE TRACKING STATE
   ============================================================ */
let fastEnv = new Float32Array(4096);
let slowEnv = new Float32Array(4096);
let transientEnergy = 0;

/* ============================================================
   CANVAS
   ============================================================ */
const waveWrap = document.getElementById('waveWrap');
const waveCanvas = document.getElementById('waveCanvas');

/* ============================================================
   MODE TABS (footer)
   ============================================================ */
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

/* Pill toggles */
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('active'));
});

/* ============================================================
   MAIN DRAW LOOP
   ============================================================ */
function draw() {
  requestAnimationFrame(draw);

  const W = waveWrap.clientWidth;
  const H = waveWrap.clientHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (waveCanvas.width !== W * dpr || waveCanvas.height !== H * dpr) {
    waveCanvas.width = W * dpr;
    waveCanvas.height = H * dpr;
  }
  const ctx = waveCanvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  /* Background */
  ctx.fillStyle = '#060810';
  ctx.fillRect(0, 0, W, H);

  const m = 24; /* left margin for dB labels */
  const mr = 16; /* right margin for meter */
  const mt = 22; /* top margin */
  const mb = 16; /* bottom margin for time scale */
  const pw = W - m - mr;
  const ph = H - mt - mb;
  const cy = mt + ph / 2;

  /* Grid */
  ctx.strokeStyle = 'rgba(255,255,255,.035)';
  ctx.lineWidth = 0.5;
  /* Horizontal */
  ctx.beginPath(); ctx.moveTo(m, cy); ctx.lineTo(m + pw, cy); ctx.stroke();
  for (let f = 0.25; f < 1; f += 0.25) {
    const y1 = cy - f * (ph / 2);
    const y2 = cy + f * (ph / 2);
    ctx.beginPath(); ctx.moveTo(m, y1); ctx.lineTo(m + pw, y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(m, y2); ctx.lineTo(m + pw, y2); ctx.stroke();
  }
  /* Vertical */
  for (let i = 0; i <= 8; i++) {
    const x = m + (pw * i) / 8;
    ctx.beginPath(); ctx.moveTo(x, mt); ctx.lineTo(x, mt + ph); ctx.stroke();
  }

  if (!analyser) return;
  analyser.getFloatTimeDomainData(timeData);

  const atkVal = knobState.attack || 0;
  const susVal = knobState.sustain || 0;
  const sensVal = knobState.sensitivity || 50;
  const speedFactor = sensVal / 100;

  const fastC = 0.01 + (1 - speedFactor) * 0.15;
  const slowC = 0.001 + speedFactor * 0.02;

  let fE = 0, sE = 0, transSum = 0;
  const step = Math.max(1, Math.floor(timeData.length / pw));
  let idx = 0;

  for (let i = 0; i < timeData.length; i++) {
    const abs = Math.abs(timeData[i]);
    if (abs > fE) fE = abs; else fE *= (1 - fastC);
    if (abs > sE) sE = abs; else sE *= (1 - slowC);
    if (i % step === 0 && idx < pw) {
      fastEnv[idx] = fE;
      slowEnv[idx] = sE;
      idx++;
    }
    transSum += Math.max(0, fE - sE);
  }
  const totalPts = idx;
  transientEnergy = transientEnergy * 0.85 + (transSum / timeData.length) * 5 * 0.15;
  const tPct = Math.min(100, Math.round(transientEnergy * 100));

  /* Update scope readout */
  document.getElementById('scopeVal').textContent = tPct + '%';
  document.getElementById('waveMeterFill').style.height = tPct + '%';

  /* Update overlay label visibility based on knob values */
  const atkOverlay = document.getElementById('atkOverlay');
  const susOverlay = document.getElementById('susOverlay');
  atkOverlay.style.color = atkVal !== 0 ? 'rgba(52,211,153,.6)' : 'rgba(52,211,153,.25)';
  susOverlay.style.color = susVal !== 0 ? 'rgba(52,211,153,.4)' : 'rgba(52,211,153,.15)';

  const atkMul = atkVal / 100;
  const susMul = susVal / 100;
  const halfH = ph / 2;

  /* ── ATTACK REGION OVERLAY (top portion, bright green when Attack > 0) ── */
  if (atkVal > 0) {
    ctx.beginPath();
    for (let i = 0; i < totalPts; i++) {
      const x = m + i;
      const envH = fastEnv[i] * halfH;
      ctx.lineTo(x, cy - envH);
    }
    for (let i = totalPts - 1; i >= 0; i--) {
      const x = m + i;
      const envH = slowEnv[i] * halfH;
      ctx.lineTo(x, cy - envH);
    }
    ctx.closePath();
    const atkAlpha = 0.08 + Math.abs(atkMul) * 0.25;
    const atkGrad = ctx.createLinearGradient(0, mt, 0, cy);
    atkGrad.addColorStop(0, `rgba(52,211,153,${atkAlpha})`);
    atkGrad.addColorStop(1, `rgba(52,211,153,${atkAlpha * 0.2})`);
    ctx.fillStyle = atkGrad;
    ctx.fill();
  } else if (atkVal < 0) {
    /* Negative attack — dim the transient region */
    ctx.beginPath();
    for (let i = 0; i < totalPts; i++) ctx.lineTo(m + i, cy - fastEnv[i] * halfH);
    for (let i = totalPts - 1; i >= 0; i--) ctx.lineTo(m + i, cy - slowEnv[i] * halfH);
    ctx.closePath();
    ctx.fillStyle = `rgba(52,211,153,${0.03 + Math.abs(atkMul) * 0.06})`;
    ctx.fill();
  }

  /* ── SUSTAIN REGION OVERLAY (body, bright when Sustain > 0) ── */
  if (susVal !== 0) {
    ctx.beginPath();
    for (let i = 0; i < totalPts; i++) ctx.lineTo(m + i, cy - slowEnv[i] * halfH);
    for (let i = totalPts - 1; i >= 0; i--) ctx.lineTo(m + i, cy + slowEnv[i] * halfH);
    ctx.closePath();
    const susAlpha = susMul > 0 ? (0.03 + susMul * 0.12) : (0.02 + Math.abs(susMul) * 0.06);
    ctx.fillStyle = `rgba(52,211,153,${susAlpha})`;
    ctx.fill();
  }

  /* ── WAVEFORM STROKE (green) ── */
  ctx.beginPath();
  for (let i = 0; i < totalPts; i++) {
    const x = m + i;
    const s = timeData[Math.min(i * step, timeData.length - 1)];
    ctx.lineTo(x, cy - s * halfH * 0.95);
  }
  ctx.strokeStyle = 'rgba(52,211,153,.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  /* Waveform body fill */
  ctx.lineTo(m + totalPts, cy);
  ctx.lineTo(m, cy);
  ctx.closePath();
  const wG = ctx.createLinearGradient(0, 0, 0, H);
  wG.addColorStop(0, 'rgba(52,211,153,.05)');
  wG.addColorStop(0.5, 'rgba(52,211,153,.01)');
  wG.addColorStop(1, 'rgba(52,211,153,.05)');
  ctx.fillStyle = wG;
  ctx.fill();

  /* Mirror waveform (bottom half, dimmer) */
  ctx.beginPath();
  for (let i = 0; i < totalPts; i++) {
    const x = m + i;
    const s = timeData[Math.min(i * step, timeData.length - 1)];
    ctx.lineTo(x, cy + Math.abs(s) * halfH * 0.8);
  }
  ctx.strokeStyle = 'rgba(52,211,153,.2)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  /* ── FAST ENVELOPE (bright green) ── */
  ctx.beginPath();
  for (let i = 0; i < totalPts; i++) ctx.lineTo(m + i, cy - fastEnv[i] * halfH);
  ctx.strokeStyle = 'rgba(52,211,153,.65)';
  ctx.lineWidth = 1.3;
  ctx.stroke();

  /* ── SLOW ENVELOPE (dimmer green) ── */
  ctx.beginPath();
  for (let i = 0; i < totalPts; i++) ctx.lineTo(m + i, cy - slowEnv[i] * halfH);
  ctx.strokeStyle = 'rgba(52,211,153,.35)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

/* ============================================================
   FILE LOADING
   ============================================================ */
const fileInput = document.getElementById('fileInput');
document.getElementById('btnLoad').addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  inputFile = file;
  audioEl.src = URL.createObjectURL(file);
  if (!sourceNode) connectSource(audioEl);
  audioEl.play();
  document.getElementById('status').textContent = file.name;
  if (audioCtx.state === 'suspended') audioCtx.resume();
});

document.getElementById('btnTone').addEventListener('click', () => {
  audioEl.src = '/static/testtone.wav';
  if (!sourceNode) connectSource(audioEl);
  audioEl.play();
  document.getElementById('status').textContent = 'Test Tone';
  if (audioCtx.state === 'suspended') audioCtx.resume();
});

/* Bypass toggle */
let bypassed = false;
document.getElementById('btnBypass').addEventListener('click', () => {
  bypassed = !bypassed;
  document.getElementById('btnBypass').classList.toggle('active', bypassed);
  if (bypassed) {
    try { inputGain.disconnect(); inputGain.connect(analyser); } catch(e){}
  } else {
    try { inputGain.disconnect(); inputGain.connect(compressor); } catch(e){}
  }
});

/* ============================================================
   BACKEND PROCESS
   ============================================================ */
function getKnobValue(id) {
  return knobState[id] !== undefined ? knobState[id] : null;
}

async function processAudio() {
  if (!inputFile) {
    document.getElementById('status').textContent = 'No file loaded';
    return;
  }
  const statusEl = document.getElementById('status');
  statusEl.textContent = 'Processing...';

  const params = {
    attack: getKnobValue('attack') !== null ? getKnobValue('attack') : 0,
    sustain: getKnobValue('sustain') !== null ? getKnobValue('sustain') : 0,
    fastEnv: 1.0,
    slowEnv: 50,
    outputGain: getKnobValue('output') !== null ? getKnobValue('output') : 0
  };

  const fd = new FormData();
  fd.append('audio', inputFile);
  fd.append('effect', 'transient_shaper');
  fd.append('params', JSON.stringify(params));
  fd.append('output_format', 'wav');

  try {
    const r = await fetch('/api/edit/mastering/process', { method: 'POST', body: fd });
    if (r.ok) {
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      audioEl.src = url;
      audioEl.play();
      statusEl.textContent = 'Processed';
    } else {
      const err = await r.text();
      statusEl.textContent = 'Error: ' + r.status;
      console.error('Process error:', err);
    }
  } catch (e) {
    statusEl.textContent = 'Request failed';
    console.error('Process fetch error:', e);
  }
}

document.getElementById('btnProcess').addEventListener('click', processAudio);

/* ============================================================
   START
   ============================================================ */
draw();

// ── Receive audio from parent page ──
window.addEventListener('message', async (e) => {
  if (e.data && e.data.type === 'thedaw-audio' && e.data.buffer) {
    try {
      const blob = new Blob([e.data.buffer], { type: 'audio/wav' });
      const file = new File([blob], e.data.name || 'track.wav', { type: 'audio/wav' });
      inputFile = file;
      audioEl.src = URL.createObjectURL(file);
      if (!sourceNode) connectSource(audioEl);
      audioEl.play();
      document.getElementById('status').textContent = file.name || 'track.wav';
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(err) { console.warn('postMessage audio load failed:', err); }
  }
});

})();
</script>
