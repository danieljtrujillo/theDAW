<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StableDAW — Edit Tool Modules</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080c;--panel:#0e1018;--surface:#141720;--border:#1e2230;--text:#e0e6f0;--dim:#5a6278;--mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans",sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-y:auto}
.container{max-width:820px;margin:0 auto;padding:32px 24px 48px}

/* HEADER */
.page-header{text-align:center;margin-bottom:32px}
.page-header .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.page-header .logo-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#00e5ff,#7c4dff);display:grid;place-items:center}
.page-header .logo-icon svg{width:22px;height:22px;color:#07080c}
.page-header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.page-header h1 span{color:var(--dim);font-weight:400}
.page-header .subtitle{font-size:12px;color:var(--dim);font-family:var(--mono);margin-top:6px;letter-spacing:.5px}
.page-header .subtitle b{color:var(--text);font-weight:600}

/* SECTION LABEL */
.section-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);color:var(--dim);margin-bottom:12px;padding-left:4px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* GRID — sized for 780x504 card previews */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:28px}

/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:8px}
.card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card:hover .card-preview{opacity:.7}
.card .card-top{display:flex;align-items:center;gap:8px}
.card .accent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card .card-name{font-size:12px;font-weight:700;letter-spacing:.3px}
.card .card-desc{font-size:9px;color:var(--dim);font-family:var(--mono);line-height:1.4;letter-spacing:.2px}
.card .card-preview{width:100%;height:48px;border-radius:6px;background:var(--surface);border:1px solid rgba(255,255,255,.03);overflow:hidden;position:relative;opacity:.5;transition:opacity .2s}
.card .card-preview canvas{width:100%;height:100%}
.card .card-size{position:absolute;bottom:6px;right:8px;font:600 7px/1 var(--mono);color:var(--dim);opacity:.4;letter-spacing:.3px}

/* UTILITY CARDS */
.utility-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:28px}
.utility-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative;opacity:.5;cursor:default;display:flex;flex-direction:column;gap:6px}
.utility-card .card-top{display:flex;align-items:center;gap:6px}
.utility-card .accent-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#5a6278}
.utility-card .card-name{font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--dim)}
.utility-card .badge{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);color:var(--dim);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:2px 6px;align-self:flex-start}

/* FOOTER INFO */
.page-footer{text-align:center;padding-top:16px;border-top:1px solid var(--border)}
.page-footer .info{font-size:10px;color:var(--dim);font-family:var(--mono);letter-spacing:.5px}
.page-footer .info a{color:var(--text);text-decoration:none}
</style>
</head>
<body>
<div class="container">

<div class="page-header">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
    <h1>StableDAW <span>Edit Tool Modules</span></h1>
  </div>
  <div class="subtitle"><b>14</b> chain modules &middot; <b>5</b> utility tools &middot; 780&times;504 pro-grade audio processing</div>
</div>

<div class="section-label">Chain Modules</div>
<div class="grid" id="moduleGrid"></div>

<div class="section-label">Utility Tools</div>
<div class="utility-grid" id="utilityGrid"></div>

<div class="page-footer">
  <div class="info">StableDAW Edit Toolkit &middot; Backend at <a href="http://127.0.0.1:8900">127.0.0.1:8900</a></div>
</div>

</div>

<script>
const MODULES = [
  { name: 'EQ', file: 'eq.html', color: '#4dd0e1', category: 'eq',
    desc: '3-band equalizer with low/mid/high', preview: 'eq-bars' },
  { name: 'Dynamics', file: 'dynamics.html', color: '#66bb6a', category: 'dynamics',
    desc: 'Compressor / gate / expander', preview: 'dynamics' },
  { name: 'Transient', file: 'transient.html', color: '#81c784', category: 'dynamics',
    desc: 'Transient shaper with attack/sustain', preview: 'transient' },
  { name: 'Maximizer', file: 'maximizer.html', color: '#ffab40', category: 'loudness',
    desc: 'Brick-wall limiter + loudness target', preview: 'maximizer' },
  { name: 'Imager', file: 'imager.html', color: '#ab47bc', category: 'spatial',
    desc: 'Stereo width + M/S processing', preview: 'imager' },
  { name: 'Exciter', file: 'exciter.html', color: '#ef5350', category: 'color',
    desc: 'Harmonic exciter + saturation', preview: 'exciter' },
  { name: 'Character FX', file: 'character-fx.html', color: '#ff7043', category: 'color',
    desc: 'Tape / tube / vinyl character', preview: 'character' },
  { name: 'Cleanup', file: 'cleanup.html', color: '#26c6da', category: 'repair',
    desc: 'Noise reduction + declip + dehum', preview: 'cleanup' },
  { name: 'Repair', file: 'repair.html', color: '#4dd0e1', category: 'repair',
    desc: 'AI-powered audio restoration', preview: 'repair' },
  { name: 'Enhance', file: 'enhance.html', color: '#42a5f5', category: 'enhance',
    desc: 'Neural upscale + clarity boost', preview: 'enhance' },
  { name: 'Vocoder', file: 'vocoder.html', color: '#e879f9', category: 'creative',
    desc: 'Dual-spectrogram cross-synthesis vocoder', preview: 'vocoder' },
  { name: 'Granular', file: 'granular.html', color: '#f59e0b', category: 'creative',
    desc: 'Grain cloud particle field with freeze', preview: 'granular' },
  { name: 'PromptFX', file: 'promptfx.html', color: '#8b5cf6', category: 'creative',
    desc: 'Text-to-effect chain with keyword mapping', preview: 'promptfx' },
  { name: 'Neural Codec', file: 'neural-codec.html', color: '#ef4444', category: 'creative',
    desc: 'RVQ quantization explorer with glitch effects', preview: 'codec' }
];

const UTILITIES = [
  { name: 'Separator', desc: 'Source separation (stems)' },
  { name: 'Spectral Editor', desc: 'Frequency-domain painting' },
  { name: 'Morph', desc: 'Audio interpolation' },
  { name: 'Generator', desc: 'AI audio generation' },
  { name: 'Export', desc: 'Format conversion + rendering' }
];

/* ── RENDER MODULE CARDS ── */
const grid = document.getElementById('moduleGrid');
MODULES.forEach(mod => {
  const card = document.createElement('a');
  card.href = mod.file;
  card.className = 'card';
  card.innerHTML = `
    <div class="card-top">
      <div class="accent-dot" style="background:${mod.color};box-shadow:0 0 6px ${mod.color}40"></div>
      <div class="card-name">${mod.name}</div>
    </div>
    <div class="card-preview"><canvas data-preview="${mod.preview}"></canvas></div>
    <div class="card-desc">${mod.desc}</div>
    <div class="card-size">780&times;504</div>
  `;
  grid.appendChild(card);
});

/* ── RENDER UTILITY CARDS ── */
const utilGrid = document.getElementById('utilityGrid');
UTILITIES.forEach(util => {
  const card = document.createElement('div');
  card.className = 'utility-card';
  card.innerHTML = `
    <div class="card-top">
      <div class="accent-dot"></div>
      <div class="card-name">${util.name}</div>
    </div>
    <div class="badge">coming soon</div>
  `;
  utilGrid.appendChild(card);
});

/* ── MINI PREVIEW RENDERERS ── */
function renderPreviews() {
  document.querySelectorAll('.card-preview canvas').forEach(canvas => {
    const type = canvas.dataset.preview;
    const W = canvas.parentElement.clientWidth;
    const H = canvas.parentElement.clientHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    switch (type) {
      case 'eq-bars': drawEqBars(ctx, W, H); break;
      case 'dynamics': drawDynamics(ctx, W, H); break;
      case 'transient': drawTransient(ctx, W, H); break;
      case 'maximizer': drawMaximizer(ctx, W, H); break;
      case 'imager': drawImager(ctx, W, H); break;
      case 'exciter': drawExciter(ctx, W, H); break;
      case 'character': drawCharacter(ctx, W, H); break;
      case 'cleanup': drawCleanup(ctx, W, H); break;
      case 'repair': drawRepair(ctx, W, H); break;
      case 'enhance': drawEnhance(ctx, W, H); break;
      case 'vocoder': drawVocoder(ctx, W, H); break;
      case 'granular': drawGranular(ctx, W, H); break;
      case 'promptfx': drawPromptfx(ctx, W, H); break;
      case 'codec': drawCodec(ctx, W, H); break;
    }
  });
}

function drawEqBars(ctx, W, H) {
  const bars = [0.5, 0.7, 0.4, 0.8, 0.6];
  const bw = W / bars.length - 4;
  bars.forEach((v, i) => {
    ctx.fillStyle = `rgba(77,208,225,${0.3 + v * 0.4})`;
    const bh = v * H * 0.8;
    ctx.fillRect(i * (bw + 4) + 2, H - bh, bw, bh);
  });
}

function drawDynamics(ctx, W, H) {
  ctx.strokeStyle = 'rgba(102,187,106,.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(4, H - 4); ctx.lineTo(W * 0.4, H * 0.5); ctx.lineTo(W - 4, H * 0.35); ctx.stroke();
  ctx.setLineDash([2, 2]); ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.beginPath(); ctx.moveTo(4, H - 4); ctx.lineTo(W - 4, 4); ctx.stroke(); ctx.setLineDash([]);
}

function drawTransient(ctx, W, H) {
  ctx.strokeStyle = 'rgba(129,199,132,.5)'; ctx.lineWidth = 1.5; ctx.beginPath();
  for (let x = 0; x < W; x++) { const t = x / W; const spike = t > 0.15 && t < 0.25 ? Math.exp(-(t - 0.2) * 80) * 20 : 0; const body = Math.sin(t * 40) * 4 * Math.exp(-t * 3); ctx.lineTo(x, H / 2 - spike - body); }
  ctx.stroke();
}

function drawMaximizer(ctx, W, H) {
  ctx.fillStyle = 'rgba(255,171,64,.15)'; ctx.fillRect(0, 4, W, H - 8);
  ctx.strokeStyle = 'rgba(255,171,64,.5)'; ctx.lineWidth = 1; ctx.beginPath();
  for (let x = 0; x < W; x++) { const v = (Math.sin(x * 0.15) + Math.sin(x * 0.23) * 0.5) * 0.35; ctx.lineTo(x, H / 2 - v * H); }
  ctx.stroke();
  ctx.strokeStyle = 'rgba(239,83,80,.4)'; ctx.setLineDash([2, 2]);
  ctx.beginPath(); ctx.moveTo(0, 6); ctx.lineTo(W, 6); ctx.stroke(); ctx.setLineDash([]);
}

function drawImager(ctx, W, H) {
  const cx = W / 2, cy = H / 2;
  for (let i = 3; i > 0; i--) { ctx.beginPath(); ctx.ellipse(cx, cy, i * W * 0.12, i * H * 0.3, 0, 0, Math.PI * 2); ctx.strokeStyle = `rgba(171,71,188,${0.15 + i * 0.1})`; ctx.lineWidth = 1; ctx.stroke(); }
}

function drawExciter(ctx, W, H) {
  ctx.strokeStyle = 'rgba(239,83,80,.4)'; ctx.lineWidth = 1;
  for (let h = 1; h <= 5; h++) { ctx.beginPath(); for (let x = 0; x < W; x++) { const v = Math.sin(x * 0.1 * h) * 3 / h; ctx.lineTo(x, H / 2 + v); } ctx.stroke(); }
}

function drawCharacter(ctx, W, H) {
  ctx.strokeStyle = 'rgba(255,112,67,.4)'; ctx.lineWidth = 1.5; ctx.beginPath();
  for (let x = 0; x < W; x++) { const v = Math.tanh(Math.sin(x * 0.12) * 2) * H * 0.3; ctx.lineTo(x, H / 2 - v); }
  ctx.stroke();
}

function drawCleanup(ctx, W, H) {
  ctx.fillStyle = 'rgba(38,198,218,.06)';
  for (let i = 0; i < 30; i++) ctx.fillRect(Math.random() * W, Math.random() * H, 2, 2);
  ctx.strokeStyle = 'rgba(38,198,218,.4)'; ctx.lineWidth = 1; ctx.beginPath();
  for (let x = 0; x < W; x++) ctx.lineTo(x, H / 2 + Math.sin(x * 0.2) * 5);
  ctx.stroke();
}

function drawRepair(ctx, W, H) {
  ctx.strokeStyle = 'rgba(77,208,225,.3)'; ctx.lineWidth = 1; ctx.beginPath();
  for (let x = 0; x < W; x++) { const glitch = (x > W * 0.3 && x < W * 0.5) ? (Math.random() - 0.5) * 10 : 0; ctx.lineTo(x, H / 2 + Math.sin(x * 0.15) * 6 + glitch); }
  ctx.stroke();
  ctx.fillStyle = 'rgba(77,208,225,.12)'; ctx.fillRect(W * 0.3, 2, W * 0.2, H - 4);
}

function drawEnhance(ctx, W, H) {
  ctx.strokeStyle = 'rgba(66,165,245,.3)'; ctx.lineWidth = 1; ctx.beginPath();
  for (let x = 0; x < W; x++) ctx.lineTo(x, H / 2 + Math.sin(x * 0.18) * 4);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(66,165,245,.6)'; ctx.lineWidth = 1.5; ctx.beginPath();
  for (let x = 0; x < W; x++) ctx.lineTo(x, H / 2 + Math.sin(x * 0.18) * 7);
  ctx.stroke();
}

function drawVocoder(ctx, W, H) {
  for (let x = 0; x < W; x += 2) {
    for (let y = 0; y < H / 2 - 2; y += 3) { const v = Math.random() * 0.5; if (v > 0.3) { ctx.fillStyle = `rgba(232,121,249,${v * 0.5})`; ctx.fillRect(x, y, 2, 2); } }
    for (let y = H / 2 + 2; y < H; y += 3) { const v = Math.random() * 0.5; if (v > 0.3) { ctx.fillStyle = `rgba(0,229,255,${v * 0.5})`; ctx.fillRect(x, y, 2, 2); } }
  }
  ctx.fillStyle = 'rgba(255,255,255,.25)'; ctx.fillRect(0, H / 2 - 1, W, 2);
}

function drawGranular(ctx, W, H) {
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const c = Math.random();
    const r = Math.floor(255 * (1 - c) * 0.9 + 40 * c);
    const g = Math.floor(160 * (1 - c) + 200 * c);
    const b = Math.floor(60 * (1 - c) + 220 * c);
    ctx.beginPath(); ctx.arc(x, y, 1 + Math.random() * 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${0.3 + Math.random() * 0.5})`;
    ctx.fill();
  }
}

function drawPromptfx(ctx, W, H) {
  const colors = ['#26c6da', '#8b5cf6', '#ef5350', '#ffab40'];
  const labels = ['LP', 'RV', 'OD', 'DL'];
  for (let i = 0; i < 4; i++) {
    const bw = W * 0.25 + Math.random() * W * 0.45;
    const by = 4 + i * 11;
    ctx.fillStyle = colors[i] + '25';
    ctx.beginPath(); ctx.roundRect(4, by, bw, 9, 3); ctx.fill();
    ctx.fillStyle = colors[i] + '70';
    ctx.beginPath(); ctx.roundRect(4, by, 3, 9, [3, 0, 0, 3]); ctx.fill();
    ctx.fillStyle = colors[i] + '90';
    ctx.font = '700 6px "IBM Plex Mono"';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], 11, by + 5);
  }
}

function drawCodec(ctx, W, H) {
  const segW = W / 16;
  for (let i = 0; i < 16; i++) {
    const t = i / 15;
    const r = Math.floor(239 * (1 - t));
    const g = Math.floor(83 * (1 - t) + 229 * t);
    const b = Math.floor(80 * (1 - t) + 255 * t);
    ctx.fillStyle = `rgba(${r},${g},${b},${i < 12 ? 0.7 : 0.08})`;
    ctx.beginPath(); ctx.roundRect(i * segW + 1, 6, segW - 2, H - 12, 2); ctx.fill();
  }
  const cutX = 12 * segW;
  ctx.strokeStyle = 'rgba(239,68,68,.35)'; ctx.lineWidth = 1; ctx.setLineDash([2, 2]);
  ctx.beginPath(); ctx.moveTo(cutX, 4); ctx.lineTo(cutX, H - 4); ctx.stroke(); ctx.setLineDash([]);
}

requestAnimationFrame(renderPreviews);
window.addEventListener('resize', renderPreviews);
</script>
</body>
</html>
