<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#07080c;--panel:#0e1018;--surface:#141720;--border:#1e2230;--accent:#ef4444;--text:#e0e6f0;--dim:#5a6278;--mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans",sans-serif}html,body{width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--sans);color:var(--text);overflow:hidden}.module-frame{width:780px;max-width:780px;height:504px;max-height:504px;background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;overflow:hidden;position:relative}.hdr{display:flex;align-items:center;padding:0 10px;background:#0a0c14;border-bottom:1px solid #1a1d28;flex-shrink:0;height:28px;gap:6px}.hdr-icon{width:16px;height:16px;color:var(--accent);flex-shrink:0}.hdr-title{font:700 10px/1 var(--mono);letter-spacing:1.4px;text-transform:uppercase;color:#c8cad0}.hdr-sep{width:1px;height:14px;background:#1e2230;margin:0 2px}.preset-nav{display:flex;align-items:center;gap:2px;font:500 8px/1 var(--mono);color:#5a5e6a}.preset-nav button{background:none;border:none;color:#5a5e6a;font-size:9px;cursor:pointer;padding:0 2px}.preset-nav button:hover{color:#a0a4b0}.preset-name{color:#6b7080;min-width:40px;text-align:center}.hdr-spacer{flex:1}.hdr-pill{font:600 7px/1 var(--mono);letter-spacing:.4px;padding:2px 6px;border-radius:3px;border:1px solid #22262e;background:#0c0e14;color:#3e4250;cursor:pointer;transition:all .12s;user-select:none}.hdr-pill:hover{border-color:#3a3e4a}.hdr-pill.on{background:rgba(239,68,68,.06);border-color:var(--accent);color:var(--accent)}.rvq-bar-area{position:relative;margin:6px 10px 4px;border-radius:10px;overflow:hidden;background:var(--surface);border:1px solid var(--border);height:120px;flex-shrink:0}.rvq-bar-area canvas{position:absolute;inset:0;width:100%!important;height:100%!important}.rvq-label{position:absolute;top:6px;left:10px;font:700 7px/1 var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);pointer-events:none;z-index:2}.rvq-info{position:absolute;top:6px;right:10px;font:700 10px/1 var(--mono);color:var(--text);pointer-events:none;z-index:2}.wave-compare{flex:1;display:flex;flex-direction:column;gap:2px;margin:0 10px;min-height:0}.wave-row{flex:1;position:relative;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;min-height:0}.wave-row canvas{position:absolute;inset:0;width:100%!important;height:100%!important}.wave-row .wlabel{position:absolute;top:4px;left:8px;font:700 7px/1 var(--mono);letter-spacing:1px;text-transform:uppercase;pointer-events:none;z-index:2}.wave-row.orig .wlabel{color:rgba(255,255,255,.22)}.wave-row.resynth .wlabel{color:var(--accent);opacity:.55}.big-slider-area{margin:6px 10px;flex-shrink:0}.big-slider-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px}.big-slider-left{display:flex;align-items:center;gap:12px}.codec-pills{display:flex;gap:3px}.codec-pills button{font:700 9px/1 var(--mono);padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--dim);letter-spacing:.5px;transition:.15s}.codec-pills button:hover{color:var(--text);border-color:rgba(255,255,255,.2)}.codec-pills button.on{color:var(--accent);border-color:var(--accent);background:rgba(239,68,68,.08)}.big-value{display:flex;align-items:baseline;gap:6px}.big-value .bv-num{font:800 34px/1 var(--mono);color:var(--accent);transition:color .2s}.big-value .bv-unit{font:700 11px/1 var(--mono);color:var(--dim)}.big-slider-right{display:flex;align-items:center;gap:14px}.bitrate-readout{text-align:right}.bitrate-readout .br-val{font:800 16px/1 var(--mono);color:var(--text)}.bitrate-readout .br-unit{font:700 8px/1 var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--dim)}.mix-knob{display:flex;flex-direction:column;align-items:center;gap:1px}.mix-knob .mk-label{font:700 7px/1 var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--dim)}.mix-knob .mk-wrap{width:48px;height:48px;cursor:grab;position:relative}.mix-knob .mk-wrap:active{cursor:grabbing}.mix-knob .mk-wrap svg{width:100%;height:100%;display:block}.mix-knob .mk-val{font:700 11px/1 var(--mono);color:var(--text)}.slider-track{position:relative;height:30px;display:flex;align-items:center;margin-top:2px}.slider-track .track-canvas{position:absolute;inset:0;border-radius:6px;overflow:hidden}.slider-track .track-canvas canvas{width:100%;height:100%;display:block}.slider-track input[type=range]{width:100%;height:30px;-webkit-appearance:none;appearance:none;background:transparent;position:relative;z-index:2;outline:none}.slider-track input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--accent);cursor:pointer;box-shadow:0 0 18px rgba(239,68,68,.5)}.slider-track input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--accent);cursor:pointer;box-shadow:0 0 18px rgba(239,68,68,.5)}.ftr{display:flex;align-items:center;gap:0;background:#08090e;border-top:1px solid #14171e;flex-shrink:0;height:24px;padding:0 6px}.ftr-bypass{font:600 7px/1 var(--mono);letter-spacing:.4px;padding:2px 7px;border-radius:3px;border:1px solid #22262e;background:#0c0e14;color:#3e4250;cursor:pointer;transition:all .12s;margin-right:6px}.ftr-bypass.on{background:rgba(239,68,68,.06);border-color:var(--accent);color:var(--accent)}.ftr-tab{font:600 7px/1 var(--mono);letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;cursor:pointer;color:#3e4250;border-bottom:2px solid transparent;transition:all .12s}.ftr-tab:hover{color:#6b7080}.ftr-tab.active{color:var(--accent);border-bottom-color:var(--accent)}.ftr-spacer{flex:1}.ftr-stat{font:600 7.5px/1 var(--mono);color:#444a58}.ftr-stat.ok{color:#22c55e}.ftr-stat.err{color:#ef5350}.ftr-btn{font:600 7px/1 var(--mono);padding:2px 7px;border-radius:3px;border:1px solid #22262e;background:#0c0e14;color:#6b7080;cursor:pointer;transition:all .12s;margin-left:4px}.ftr-btn:hover{background:#14171e;color:#c8cad0}.ftr-btn.proc{background:rgba(239,68,68,.06);border-color:var(--accent);color:var(--accent)}.ftr-btn.proc:hover{background:rgba(239,68,68,.12)}audio{display:none}input[type="file"]{display:none}.glitch-overlay{position:absolute;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity .3s}.glitch-overlay.active{opacity:1}.glitch-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(239,68,68,.03) 2px,rgba(239,68,68,.03) 4px);pointer-events:none;opacity:0;transition:opacity .3s}.glitch-scanlines.active{opacity:1}</style></head>
<body><div class="module-frame">
<div class="hdr"><svg class="hdr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M6 8h2v8H6zM10 6h2v12h-2zM14 9h2v6h-2zM18 7h2v10h-2z"/></svg><span class="hdr-title">Neural Codec</span><div class="hdr-sep"></div><div class="preset-nav"><button>&#9666;</button><span class="preset-name">Default</span><button>&#9656;</button></div><span class="hdr-spacer"></span><button class="hdr-pill">A/B</button><button class="hdr-pill">COPY</button><button class="hdr-pill">&#916;</button><button class="hdr-pill">&#9881;</button></div>
<div class="rvq-bar-area" id="rvqArea"><canvas id="rvqCanvas"></canvas><div class="rvq-label">RVQ Quantization Levels</div><div class="rvq-info" id="rvqInfo">32 / 32 active</div></div>
<div class="wave-compare"><div class="wave-row orig" id="waveOrig"><canvas id="waveOrigCanvas"></canvas><div class="wlabel">ORIGINAL</div></div><div class="wave-row resynth" id="waveResynth"><canvas id="waveResynthCanvas"></canvas><div class="wlabel">RE-SYNTHESIZED</div></div></div>
<div class="big-slider-area"><div class="big-slider-top"><div class="big-slider-left"><div class="codec-pills"><button class="on" data-codec="dac">DAC</button><button data-codec="opus">OPUS</button><button data-codec="encodec">ENCODEC</button></div><div class="big-value"><div class="bv-num" id="vQuant">32</div><div class="bv-unit">quantizers</div></div></div><div class="big-slider-right"><div class="bitrate-readout"><div class="br-val" id="vBitrate">192</div><div class="br-unit">kbps</div></div><div class="mix-knob"><div class="mk-label">Mix</div><div class="mk-wrap" id="mixKnobWrap"><svg viewBox="0 0 48 48" id="mixKnobSvg"></svg></div><div class="mk-val" id="vMix">100%</div></div></div></div><div class="slider-track"><div class="track-canvas"><canvas id="trackCanvas"></canvas></div><input type="range" id="pQuant" min="1" max="32" value="32" step="1"></div></div>
<div class="ftr"><button class="ftr-bypass on" id="bypBtn">ON</button><div class="ftr-tab active">CODEC</div><div class="ftr-tab">RVQ</div><div class="ftr-tab">ANALYZER</div><span class="ftr-spacer"></span><span class="ftr-stat" id="status">ready</span><button class="ftr-btn" id="pickFile">LOAD</button><button class="ftr-btn" id="useTone">TONE</button><button class="ftr-btn proc" id="runBtn">&#9654;</button><audio id="ain" controls></audio><audio id="aout" controls></audio></div>

<script>
let actx,analyser,source,inputFile,inputBuf,nQuantizers=32,mix=100,codecType='dac';const freqData=new Uint8Array(2048),timeData=new Float32Array(4096);let frame=0;
document.getElementById('bypBtn').addEventListener('click',function(){this.classList.toggle('on')});document.querySelectorAll('.hdr-pill').forEach(p=>p.addEventListener('click',function(){this.classList.toggle('on')}));document.querySelectorAll('.ftr-tab').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.ftr-tab').forEach(x=>x.classList.remove('active'));this.classList.add('active')}));
function segColor(i){if(i<1)return[239,83,80];if(i<4){const t=(i-1)/3;return[Math.floor(239+(255-239)*t),Math.floor(83+(171-83)*t),Math.floor(80+(64-80)*t)]}if(i<8){const t=(i-4)/4;return[255,Math.floor(171+(193-171)*t),Math.floor(64+(7-64)*t)]}if(i<16){const t=(i-8)/8;return[Math.floor(255+(102-255)*t),Math.floor(193+(187-193)*t),Math.floor(7+(106-7)*t)]}if(i<24){const t=(i-16)/8;return[Math.floor(102+(66-102)*t),Math.floor(187+(165-187)*t),Math.floor(106+(245-106)*t)]}const t=(i-24)/7;return[Math.floor(66-66*t),Math.floor(165+(229-165)*t),Math.floor(245+(255-245)*t)]}
document.querySelectorAll('.codec-pills button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.codec-pills button').forEach(x=>x.classList.remove('on'));b.classList.add('on');codecType=b.dataset.codec}));
document.getElementById('pQuant').oninput=e=>{nQuantizers=+e.target.value;document.getElementById('vQuant').textContent=nQuantizers;document.getElementById('rvqInfo').textContent=nQuantizers+' / 32 active';document.getElementById('vBitrate').textContent=Math.round(nQuantizers*6);const ov=document.getElementById('glitchOverlay'),sl=document.getElementById('glitchScanlines');if(nQuantizers<=3){ov.classList.add('active');sl.classList.add('active');const int=(4-nQuantizers)*.015;ov.style.background=`repeating-linear-gradient(0deg,transparent,transparent ${2+Math.random()*4}px,rgba(239,68,68,${int}) ${2+Math.random()*4}px,rgba(239,68,68,${int}) ${4+Math.random()*5}px)`;if(nQuantizers===1)ov.style.background+=`,repeating-linear-gradient(90deg,transparent 0%,rgba(0,255,128,0.015) 50%,transparent 100%)`}else{ov.classList.remove('active');sl.classList.remove('active')}const vq=document.getElementById('vQuant');if(nQuantizers<=3)vq.style.color='#ef4444';else if(nQuantizers<=8)vq.style.color='#ffab40';else if(nQuantizers<=16)vq.style.color='#66bb6a';else vq.style.color='#26c6da';updateCodecLive()};
const mixKnobSvg=document.getElementById('mixKnobSvg'),vMixEl=document.getElementById('vMix');
function renderMixKnob(){const cx=24,cy=24,r=18,color='#ef4444',val=mix,sA=135,range=270,ang=sA+(val/100)*range;function pol(a,rad){const d=(a-90)*Math.PI/180;return{x:cx+rad*Math.cos(d),y:cy+rad*Math.sin(d)}}const s=pol(sA,r),v=pol(ang,r),e=pol(sA+range,r),la=(ang-sA)>180?1:0,innerR=9,tickR=r+3;let ticks='';for(let i=0;i<=10;i++){const ta=sA+(i/10)*range,p1=pol(ta,tickR),p2=pol(ta,tickR+2),lit=((ta-sA)/range)<=(val/100);ticks+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${lit?color:'rgba(255,255,255,.05)'}" stroke-width="${lit?1:.5}" stroke-linecap="round" opacity="${lit?.6:.25}"/>`}mixKnobSvg.innerHTML=`<defs><filter id="gmk"><feGaussianBlur stdDeviation="2.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter><radialGradient id="fmk" cx="50%" cy="38%" r="60%"><stop offset="0" stop-color="#1c1f2e"/><stop offset="1" stop-color="#0a0d16"/></radialGradient></defs>${ticks}<path d="M${s.x},${s.y} A${r},${r} 0 1 1 ${e.x},${e.y}" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="4" stroke-linecap="round"/><path d="M${s.x},${s.y} A${r},${r} 0 ${la} 1 ${v.x},${v.y}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" filter="url(#gmk)"/><circle cx="${v.x}" cy="${v.y}" r="2.5" fill="${color}" filter="url(#gmk)"/><circle cx="${cx}" cy="${cy}" r="${innerR}" fill="url(#fmk)" stroke="${color}22" stroke-width="1.5"/><line x1="${cx}" y1="${cy-2}" x2="${cx+Math.cos((ang-90)*Math.PI/180)*(innerR-2)}" y2="${cy+Math.sin((ang-90)*Math.PI/180)*(innerR-2)}" stroke="${color}aa" stroke-width="2" stroke-linecap="round"/>`;vMixEl.textContent=mix+'%'}renderMixKnob();
let mixDragging=false,mixStartY=0,mixStartVal=0;document.getElementById('mixKnobWrap').addEventListener('pointerdown',e=>{mixDragging=true;mixStartY=e.clientY;mixStartVal=mix;e.target.setPointerCapture(e.pointerId)});window.addEventListener('pointermove',e=>{if(!mixDragging)return;mix=Math.round(Math.max(0,Math.min(100,mixStartVal+(mixStartY-e.clientY)*.6)));renderMixKnob();updateCodecMix()});window.addEventListener('pointerup',()=>{mixDragging=false});document.getElementById('mixKnobWrap').addEventListener('wheel',e=>{e.preventDefault();mix=Math.round(Math.max(0,Math.min(100,mix+(e.deltaY>0?-2:2))));renderMixKnob();updateCodecMix()},{passive:false});
const rvqCanvas=document.getElementById('rvqCanvas'),rvqArea=document.getElementById('rvqArea');function drawRVQ(){const W=rvqArea.clientWidth,H=rvqArea.clientHeight,dpr=Math.min(window.devicePixelRatio||1,2);if(rvqCanvas.width!==W*dpr||rvqCanvas.height!==H*dpr){rvqCanvas.width=W*dpr;rvqCanvas.height=H*dpr}const ctx=rvqCanvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);const pad=10,topPad=22,botPad=16,barH=H-topPad-botPad,gap=2,segW=(W-pad*2-gap*31)/32;let energy=0;if(analyser){analyser.getByteFrequencyData(freqData);for(let i=0;i<256;i++)energy+=freqData[i];energy/=(256*255)}for(let i=0;i<32;i++){const x=pad+i*(segW+gap),[r,g,b]=segColor(i),active=i<nQuantizers;if(active){const boost=energy*14*(1-i/40),drawH=barH+boost,drawY=topPad-boost/2;ctx.shadowColor=`rgba(${r},${g},${b},0.55)`;ctx.shadowBlur=10+energy*12;ctx.fillStyle=`rgba(${r},${g},${b},0.88)`;ctx.beginPath();ctx.roundRect(x,drawY,segW,drawH,2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(x,drawY,segW,1.5)}else{ctx.fillStyle='rgba(255,255,255,.02)';ctx.beginPath();ctx.roundRect(x,topPad,segW,barH,2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(x+1,topPad+2);ctx.lineTo(x+segW-1,topPad+barH-2);ctx.moveTo(x+segW-1,topPad+2);ctx.lineTo(x+1,topPad+barH-2);ctx.stroke()}if(i===0||i===3||i===7||i===15||i===23||i===31){ctx.fillStyle=active?`rgba(${r},${g},${b},0.55)`:'rgba(255,255,255,.06)';ctx.font='600 7px "IBM Plex Mono"';ctx.textAlign='center';ctx.fillText(String(i+1),x+segW/2,topPad+barH+11)}}if(nQuantizers<32){const cutX=pad+nQuantizers*(segW+gap)-gap/2;ctx.strokeStyle=`rgba(239,68,68,${.3+Math.sin(frame*.06)*.15})`;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(cutX,topPad-4);ctx.lineTo(cutX,topPad+barH+4);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(239,68,68,.25)';ctx.font='700 7px "IBM Plex Mono"';ctx.textAlign='left';ctx.fillText('DROPPED',cutX+4,topPad+10)}}
const trackCanvas=document.getElementById('trackCanvas');function drawSliderTrack(){const container=trackCanvas.parentElement,W=container.clientWidth,H=container.clientHeight,dpr=Math.min(window.devicePixelRatio||1,2);if(trackCanvas.width!==W*dpr||trackCanvas.height!==H*dpr){trackCanvas.width=W*dpr;trackCanvas.height=H*dpr}const ctx=trackCanvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);const pad=10,trackH=8,trackY=(H-trackH)/2,gap=1,segW=(W-pad*2-gap*31)/32;for(let i=0;i<32;i++){const x=pad+i*(segW+gap),[r,g,b]=segColor(i),active=i<nQuantizers;ctx.fillStyle=active?`rgba(${r},${g},${b},0.75)`:'rgba(255,255,255,.04)';ctx.beginPath();ctx.roundRect(x,trackY,segW,trackH,2);ctx.fill()}}
const wOC=document.getElementById('waveOrigCanvas'),wRC=document.getElementById('waveResynthCanvas'),wO=document.getElementById('waveOrig'),wR=document.getElementById('waveResynth');function drawWaveform(canvas,container,color,alpha,dist){const W=container.clientWidth,H=container.clientHeight,dpr=Math.min(window.devicePixelRatio||1,2);if(canvas.width!==W*dpr||canvas.height!==H*dpr){canvas.width=W*dpr;canvas.height=H*dpr}const ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();if(!analyser)return;analyser.getFloatTimeDomainData(timeData);const step=Math.max(1,Math.floor(timeData.length/W));ctx.beginPath();for(let x=0;x<W;x++){const idx=Math.min(x*step,timeData.length-1);let val=timeData[idx];if(dist>0){val+=Math.sin(x*.08+performance.now()*.0008)*dist*.12;const s=Math.max(2,nQuantizers*8);val=Math.round(val*s)/s}const y=H/2-val*H*.4;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.strokeStyle=color;ctx.globalAlpha=alpha;ctx.lineWidth=1.5;ctx.stroke();ctx.lineTo(W,H/2);ctx.lineTo(0,H/2);ctx.closePath();const grad=ctx.createLinearGradient(0,0,0,H);const cp=color.match(/[\d.]+/g);if(cp&&cp.length>=3){grad.addColorStop(0,`rgba(${cp[0]},${cp[1]},${cp[2]},0.06)`);grad.addColorStop(.5,'transparent');grad.addColorStop(1,`rgba(${cp[0]},${cp[1]},${cp[2]},0.06)`)}ctx.fillStyle=grad;ctx.fill();ctx.globalAlpha=1}
function draw(){requestAnimationFrame(draw);frame++;drawRVQ();drawSliderTrack();const d=1-(nQuantizers-1)/31;drawWaveform(wOC,wO,'rgba(255,255,255,0.3)',.3,0);drawWaveform(wRC,wR,'rgba(239,68,68,0.9)',.85,d)}draw();
let liveCodecLP,liveCodecWS,liveCodecDry,liveCodecWet;function buildCodecChain(){if(!actx)return;liveCodecLP=actx.createBiquadFilter();liveCodecLP.type='lowpass';updateCodecLive();liveCodecWS=actx.createWaveShaper();updateCodecDistortion();liveCodecLP.connect(liveCodecWS);liveCodecDry=actx.createGain();liveCodecWet=actx.createGain();liveCodecWet.gain.value=1;liveCodecDry.gain.value=0;liveCodecWS.connect(liveCodecWet)}function updateCodecLive(){if(!liveCodecLP)return;liveCodecLP.frequency.value=1000+nQuantizers*600;liveCodecLP.Q.value=.7;updateCodecDistortion();updateCodecMix()}function updateCodecDistortion(){if(!liveCodecWS)return;const d=Math.max(0,(16-nQuantizers)*.3);if(d<=0){liveCodecWS.curve=null;return}const n=44100,curve=new Float32Array(n),k=d*50;for(let i=0;i<n;i++){const x=(i*2)/n-1;curve[i]=((3+k)*x*20*(Math.PI/180))/(Math.PI+k*Math.abs(x))}liveCodecWS.curve=curve;liveCodecWS.oversample='4x'}function updateCodecMix(){if(!liveCodecDry||!liveCodecWet)return;liveCodecWet.gain.value=mix/100;liveCodecDry.gain.value=1-mix/100}function connectCodecChain(){if(!actx||!source||!liveCodecLP)return;try{source.disconnect()}catch(e){}source.connect(liveCodecLP);source.connect(liveCodecDry);liveCodecWet.connect(analyser);liveCodecDry.connect(analyser);analyser.connect(actx.destination)}
function ensureAudio(){if(actx)return;actx=new AudioContext();analyser=actx.createAnalyser();analyser.fftSize=4096;analyser.smoothingTimeConstant=.82;buildCodecChain()}function connectBuf(buf){if(source)try{source.stop()}catch(e){}source=actx.createBufferSource();source.buffer=buf;source.loop=true;if(!liveCodecLP)buildCodecChain();connectCodecChain();source.start()}async function loadFile(file){ensureAudio();inputFile=file;const ab=await file.arrayBuffer();inputBuf=await actx.decodeAudioData(ab.slice(0));document.getElementById('ain').src=URL.createObjectURL(file);connectBuf(inputBuf)}
document.getElementById('fileinput').onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};document.getElementById('pickFile').onclick=()=>document.getElementById('fileinput').click();document.getElementById('useTone').onclick=async()=>{const r=await fetch('/static/testtone.wav');const b=await r.blob();loadFile(new File([b],'testtone.wav',{type:'audio/wav'}))};
document.getElementById('runBtn').onclick=async()=>{if(!inputFile)return;const st=document.getElementById('status');st.className='ftr-stat';st.textContent='processing...';const fd=new FormData();fd.append('effect','neural_codec');fd.append('params',JSON.stringify({nQuantizers,mix:mix/100}));fd.append('output_format','wav');fd.append('audio',inputFile);const t0=performance.now();try{const r=await fetch('/api/edit/enhance/process',{method:'POST',body:fd});if(r.ok){const blob=await r.blob();document.getElementById('aout').src=URL.createObjectURL(blob);st.className='ftr-stat ok';st.textContent=(blob.size/1024).toFixed(0)+'KB '+Math.round(performance.now()-t0)+'ms'}else{st.className='ftr-stat err';st.textContent=r.status+' error'}}catch(e){st.className='ftr-stat err';st.textContent='ERR'}};
document.getElementById('pQuant').dispatchEvent(new Event('input'));

// ── Receive audio from parent page ──
window.addEventListener('message', async (e) => {
  if (e.data && e.data.type === 'thedaw-audio' && e.data.buffer) {
    try {
      const blob = new Blob([e.data.buffer], { type: 'audio/wav' });
      const file = new File([blob], e.data.name || 'track.wav', { type: 'audio/wav' });
      if (typeof loadFile === 'function') { loadFile(file); }
      else {
        const ain = document.getElementById('ain') || document.querySelector('audio');
        if (ain) { ain.src = URL.createObjectURL(blob); }
      }
    } catch(err) { console.warn('postMessage audio load failed:', err); }
  }
});
