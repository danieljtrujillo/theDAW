<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;background:transparent}</style></head><body><script>let W=window.innerWidth,H=window.innerHeight;const c=document.createElement('canvas');c.width=W;c.height=H;document.body.appendChild(c);document.body.style.margin='0';document.body.style.overflow='hidden';const ctx=c.getContext('2d');let posX=W/2,posY=H/2,isDown=false,toggled=false,trails=[],dotR=7;let tX=W-20,tY=20,tR=10;window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;c.width=W;c.height=H;tX=W-20;if(!isDown){posX=W/2;posY=H/2;}});window.addEventListener('mousedown',e=>{if(Math.hypot(e.offsetX-tX,e.offsetY-tY)<=tR*1.5){toggled=!toggled;return;}isDown=true;posX=e.offsetX;posY=e.offsetY;trails=[];});window.addEventListener('mousemove',e=>{if(!isDown)return;posX=e.offsetX;posY=e.offsetY;window.parent.postMessage({type:'updateValue',id:'oivsvlg',valueX:posX/W,valueY:posY/H},'*');});window.addEventListener('mouseup',()=>isDown=false);window.addEventListener('mouseleave',()=>isDown=false);window.addEventListener('wheel',e=>{if(!isDown)return;e.preventDefault();let d=e.deltaY<0?1:-1;dotR+=d*1.5;if(dotR<2)dotR=2;if(dotR>40)dotR=40;},{passive:false});function distort(px,py,tx,ty,r){let dx=px-tx,dy=py-ty,dist=Math.sqrt(dx*dx+dy*dy);let gRad=Math.max(r*12,30);let gPull=r*4.5;if(dist<gRad&&dist>0){let pull=Math.pow((gRad-dist)/gRad,2)*gPull;return{x:px-(dx/dist)*pull,y:py-(dy/dist)*pull};}return{x:px,y:py};}function loop(){ctx.clearRect(0,0,W,H);ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.beginPath();for(let i=1;i<8;i++){let y=i*H/8;for(let x=0;x<=W;x+=5){let pt=distort(x,y,posX,posY,dotR);if(x===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);}let gx=i*W/8;for(let y2=0;y2<=H;y2+=5){let pt=distort(gx,y2,posX,posY,dotR);if(y2===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);}}ctx.stroke();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.beginPath();for(let y2=0;y2<=H;y2+=5){let pt=distort(posX,y2,posX,posY,dotR);if(y2===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);}for(let x2=0;x2<=W;x2+=5){let pt=distort(x2,posY,posX,posY,dotR);if(x2===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);}ctx.stroke();if(!isDown){let dx=(W/2-posX),dy=(H/2-posY),moved=false;if(Math.abs(dx)>0.2||Math.abs(dy)>0.2){posX+=dx*0.025;posY+=dy*0.025;moved=true;}else if(posX!==W/2||posY!==H/2){posX=W/2;posY=H/2;moved=true;}if(moved)window.parent.postMessage({type:'updateValue',id:'oivsvlg',valueX:posX/W,valueY:posY/H},'*');}if(isDown||Math.hypot(posX-W/2,posY-H/2)>0.2)trails.push({x:posX,y:posY,age:0});for(let i=trails.length-1;i>=0;i--){trails[i].age++;if(trails[i].age>25)trails.splice(i,1);}if(trails.length>1){ctx.lineCap='round';ctx.lineJoin='round';for(let i=0;i<trails.length-1;i++){let t1=trails[i],t2=trails[i+1],p=1-(t1.age/25);if(p<0)p=0;ctx.beginPath();ctx.moveTo(t1.x,t1.y);ctx.lineTo(t2.x,t2.y);ctx.strokeStyle='rgba(255,255,255,'+(p*0.9)+')';ctx.lineWidth=p*(dotR*2);ctx.stroke();}}ctx.beginPath();ctx.arc(posX,posY,dotR,0,Math.PI*2);ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=dotR*1.5+2;ctx.fill();ctx.shadowBlur=0;ctx.beginPath();ctx.arc(tX,tY,tR,0,Math.PI*2);if(toggled){let p=0.5+0.5*Math.sin(Date.now()/1500);let a=0.65+p*0.35;let r=Math.floor(80+p*70);let g=ctx.createRadialGradient(tX,tY,0,tX,tY,tR);g.addColorStop(0,'rgba('+r+',0,0,'+a+')');g.addColorStop(1,'rgba(10,0,0,'+a+')');ctx.fillStyle=g;ctx.fill();}else{ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}requestAnimationFrame(loop);}loop();</script></body></html>
