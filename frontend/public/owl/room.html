<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;background:transparent}</style></head><body><style>canvas{width:100%;height:100%;display:block;}</style><canvas id='c'></canvas><script>const cvs=document.getElementById('c');const ctx=cvs.getContext('2d');let w,h,cx,cy;let nds=[{x:0,y:0,z:1,id:'SRC-01'},{x:0,y:0,z:1,id:'SRC-02'},{x:0,y:0,z:1,id:'SRC-03'}];let init=true;function rz(){w=cvs.width=cvs.offsetWidth;h=cvs.height=cvs.offsetHeight;cx=w/2;cy=h/2;if(init){nds[0].x=cx-40;nds[0].y=cy-40;nds[1].x=cx+50;nds[1].y=cy-20;nds[2].x=cx-10;nds[2].y=cy+50;init=false;}nds.forEach(n=>{n.x=Math.max(20,Math.min(w-20,n.x));n.y=Math.max(20,Math.min(h-20,n.y));});}window.addEventListener('resize',rz);rz();let act=null;cvs.addEventListener('mousedown',e=>{const r=cvs.getBoundingClientRect();const mx=e.clientX-r.left;const my=e.clientY-r.top;act=nds.find(n=>Math.hypot(n.x-mx,n.y-my)<15)||null;});window.addEventListener('mouseup',()=>act=null);window.addEventListener('mouseleave',()=>act=null);cvs.addEventListener('mousemove',e=>{if(!act)return;const r=cvs.getBoundingClientRect();let nx=e.clientX-r.left;let ny=e.clientY-r.top;act.x=Math.max(20,Math.min(w-20,nx));act.y=Math.max(20,Math.min(h-20,ny));});cvs.addEventListener('wheel',e=>{if(!act)return;e.preventDefault();act.z-=e.deltaY*0.0004;if(act.z<0.7)act.z=0.7;if(act.z>1.3)act.z=1.3;},{passive:false});function drw(){ctx.clearRect(0,0,w,h);ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;for(let i=1;i<=4;i++){ctx.beginPath();ctx.arc(cx,cy,i*35,0,Math.PI*2);ctx.stroke();}ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('L',cx,cy);ctx.beginPath();ctx.moveTo(cx-6,cy);ctx.lineTo(cx-12,cy-3);ctx.lineTo(cx-12,cy+3);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();ctx.beginPath();ctx.arc(cx,cy,50,Math.PI-0.25,Math.PI+0.25);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.stroke();nds.forEach(n=>{const dx=cx-n.x;const dy=cy-n.y;ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(cx,cy);ctx.setLineDash([2,4]);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.stroke();ctx.setLineDash([]);const g=ctx.createLinearGradient(n.x,n.y,cx,cy);g.addColorStop(0,'rgba(255,255,255,0.4)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.quadraticCurveTo(n.x+dx*0.5-dy*0.3,n.y+dy*0.5+dx*0.3,cx,cy);ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();const rad=6*n.z;ctx.beginPath();ctx.arc(n.x,n.y,rad,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,rad+4,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();const zp=(n.z-0.7)/0.6;if(zp>0.01){ctx.beginPath();ctx.arc(n.x,n.y,rad+8,-Math.PI/2,-Math.PI/2+(Math.PI*2*zp));ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.stroke();}ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText(n.id+' Z:'+Math.round(zp*99),n.x+rad+14,n.y);});requestAnimationFrame(drw);}drw();setInterval(function(){try{var n=nds[0];var dx=(n.x-cx),dy=(n.y-cy);var rad=Math.min(1,Math.hypot(dx,dy)/(Math.min(w,h)/2-20));window.parent.postMessage({type:'updateValue',id:'owl-room',rad:rad,z:(n.z-0.7)/0.6},'*');}catch(e){}},120);</script></body></html>
