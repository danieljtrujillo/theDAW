    <!-- ?v=3 busts browser cache after the favicon mark changes —
         browsers cache favicons aggressively (across reloads, even
         across sessions) so the version query is the cleanest
         "please refetch" signal. Bump when /favicon.svg changes. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=4" />
